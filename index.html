<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RainPro | Hyper-Local</title>
    <style>
        :root { --accent: #00FFFF; --bg: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header & Search */
        .header { width: 100%; max-width: 500px; display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 15px; background: var(--card); border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 1rem; }
        button { padding: 15px 25px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }

        /* Main Hero Section */
        .hero { text-align: center; margin-bottom: 40px; width: 100%; }
        #countdown { font-size: 6rem; font-weight: 900; color: var(--accent); line-height: 1; margin: 10px 0; }
        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 3px; }
        #status-text { color: #aaa; margin-bottom: 20px; }

        /* Hourly Scroll */
        .section-title { width: 100%; max-width: 500px; text-align: left; font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .hourly-container { display: flex; overflow-x: auto; gap: 15px; width: 100%; max-width: 500px; padding-bottom: 15px; scrollbar-width: none; }
        .hourly-container::-webkit-scrollbar { display: none; }
        .hour-card { min-width: 70px; background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .hour-card.active { border-color: var(--accent); background: #002222; }

        /* 5-Day List */
        .daily-container { width: 100%; max-width: 500px; background: var(--card); border-radius: 20px; padding: 10px; margin-top: 20px; }
        .daily-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .daily-row:last-child { border-bottom: none; }
        
        /* Volume Gauge */
        .gauge-wrapper { display: flex; align-items: flex-end; gap: 15px; margin-top: 20px; }
        .gauge-bar { width: 12px; height: 100px; background: #222; border-radius: 6px; overflow: hidden; position: relative; }
        #water-fill { position: absolute; bottom: 0; width: 100%; background: var(--accent); transition: height 1s; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="cityInput" placeholder="Village or City...">
        <button onclick="fetchRainData(document.getElementById('cityInput').value)">GO</button>
    </div>

    <div class="hero">
        <div class="label" id="location-display">Detecting Village...</div>
        <div id="countdown">--</div>
        <div class="label">Mins until rain</div>
        <div id="status-text">Fetching live radar...</div>
        
        <div class="gauge-wrapper" style="justify-content: center;">
            <div class="gauge-bar"><div id="water-fill" style="height: 0%"></div></div>
            <div style="text-align: left;">
                <div class="label">24H Total</div>
                <div id="total-mm" style="font-size: 1.5rem; font-weight: bold; color: var(--accent);">0.0 mm</div>
            </div>
        </div>
    </div>

    <div class="section-title">24-Hour Rain Forecast</div>
    <div class="hourly-container" id="hourlyList"></div>

    <div class="section-title" style="margin-top: 30px;">Next 5 Days</div>
    <div class="daily-container" id="dailyList"></div>

    <script>
        const API_KEY = '371f195d68084031ade140420261405';

        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    fetchRainData(`${pos.coords.latitude},${pos.coords.longitude}`);
                }, () => fetchRainData('Bagalkote'));
            }
        };

        async function fetchRainData(query) {
            try {
                const response = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${query}&days=5&aqi=no`);
                const data = await response.json();
                updateDashboard(data);
            } catch (e) {
                document.getElementById('status-text').innerText = "Error loading data.";
            }
        }

        function updateDashboard(data) {
            document.getElementById('location-display').innerText = `${data.location.name}, ${data.location.region}`;
            
            // 1. Update Hourly
            const hourlyList = document.getElementById('hourlyList');
            hourlyList.innerHTML = '';
            const hours = data.forecast.forecastday[0].hour;
            const now = new Date();
            let nextRainMins = "--";
            let foundNext = false;
            let dayTotal = 0;

            hours.forEach(hr => {
                const time = new Date(hr.time);
                dayTotal += hr.precip_mm;
                
                if (time > now) {
                    if (!foundNext && hr.precip_mm > 0) {
                        nextRainMins = Math.round((time - now) / 60000);
                        foundNext = true;
                    }
                    const card = document.createElement('div');
                    card.className = `hour-card ${hr.precip_mm > 0 ? 'active' : ''}`;
                    card.innerHTML = `
                        <div style="font-size: 0.7rem; color: #888;">${time.getHours()}:00</div>
                        <div style="font-weight: bold; margin: 5px 0;">${hr.precip_mm}</div>
                        <div style="font-size: 0.6rem; color: var(--accent);">mm</div>
                    `;
                    hourlyList.appendChild(card);
                }
            });

            document.getElementById('countdown').innerText = nextRainMins === "--" ? "0" : nextRainMins;
            document.getElementById('total-mm').innerText = dayTotal.toFixed(1) + " mm";
            document.getElementById('water-fill').style.height = Math.min((dayTotal / 20) * 100, 100) + "%";
            document.getElementById('status-text').innerText = foundNext ? "Rain expected soon." : "Clear skies today.";

            // 2. Update 5-Day Forecast
            const dailyList = document.getElementById('dailyList');
            dailyList.innerHTML = '';
            data.forecast.forecastday.forEach(day => {
                const date = new Date(day.date).toLocaleDateString('en-US', { weekday: 'short' });
                const row = document.createElement('div');
                row.className = 'daily-row';
                row.innerHTML = `
                    <div style="font-weight: bold; width: 50px;">${date}</div>
                    <div style="color: #888; font-size: 0.8rem;">${day.day.condition.text}</div>
                    <div style="color: var(--accent); font-weight: bold;">${day.day.totalprecip_mm} mm</div>
                `;
                dailyList.appendChild(row);
            });
        }
    </script>
</body>
</html>
