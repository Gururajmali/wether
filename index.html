<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RainVision | Hyper Local Rainfall Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#020617;
    --card:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);
    --accent:#00F5FF;
    --text:#ffffff;
    --muted:#94A3B8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top right,#0f172a,#020617 60%);
    color:var(--text);
    overflow-x:hidden;
    padding:20px;
    display:flex;
    justify-content:center;
}

/* Background Glow */

body::before{
    content:'';
    position:fixed;
    width:350px;
    height:350px;
    background:#00ffff22;
    filter:blur(120px);
    top:-120px;
    right:-100px;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:300px;
    height:300px;
    background:#2563eb22;
    filter:blur(120px);
    bottom:-100px;
    left:-100px;
    z-index:-1;
}

.app{
    width:100%;
    max-width:540px;
}

/* Search Section */

.search-box{
    display:flex;
    gap:12px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:18px 20px;
    border:none;
    outline:none;
    border-radius:22px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    color:white;
    font-size:1rem;
    transition:0.3s;
}

.search-box input:focus{
    border-color:#00ffff88;
    box-shadow:0 0 20px #00ffff33;
}

.search-box button{
    padding:18px 24px;
    border:none;
    border-radius:22px;
    background:var(--accent);
    color:black;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
}

.search-box button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #00ffff66;
}

/* Hero Section */

.hero{
    position:relative;
    overflow:hidden;
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(14px);
    border-radius:32px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 0 40px #00000050;
}

/* Rain Animation */

.rain{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.drop{
    position:absolute;
    width:2px;
    height:80px;
    background:linear-gradient(transparent,var(--accent));
    opacity:0.3;
    animation:rain 1.4s linear infinite;
}

.drop:nth-child(1){left:10%;animation-delay:0s;}
.drop:nth-child(2){left:25%;animation-delay:0.4s;}
.drop:nth-child(3){left:40%;animation-delay:0.8s;}
.drop:nth-child(4){left:55%;animation-delay:0.2s;}
.drop:nth-child(5){left:70%;animation-delay:1s;}
.drop:nth-child(6){left:85%;animation-delay:0.5s;}

@keyframes rain{
    from{
        transform:translateY(-120px);
    }
    to{
        transform:translateY(500px);
    }
}

/* Text */

.location{
    color:var(--muted);
    letter-spacing:2px;
    text-transform:uppercase;
    font-size:0.8rem;
}

.rain-amount{
    font-size:6rem;
    font-weight:900;
    line-height:1;
    margin-top:10px;
    color:var(--accent);
    text-shadow:0 0 25px #00ffff88;
}

.mm{
    font-size:1.3rem;
    font-weight:700;
    color:#67e8f9;
    margin-top:10px;
}

.status{
    margin-top:15px;
    color:#cbd5e1;
    font-size:0.95rem;
}

/* Sections */

.section-title{
    margin-top:30px;
    margin-bottom:15px;
    color:var(--accent);
    font-size:0.9rem;
    letter-spacing:2px;
    text-transform:uppercase;
}

/* Hourly Cards */

.hourly{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding-bottom:10px;
    scrollbar-width:none;
}

.hourly::-webkit-scrollbar{
    display:none;
}

.card{
    min-width:95px;
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(12px);
    border-radius:24px;
    padding:18px 15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    border-color:#00ffff66;
    box-shadow:0 0 20px #00ffff22;
}

.time{
    color:var(--muted);
    font-size:0.75rem;
}

.amount{
    font-size:1.7rem;
    font-weight:800;
    margin-top:10px;
    color:white;
}

.unit{
    color:var(--accent);
    font-size:0.7rem;
    margin-top:5px;
}

/* Daily Forecast */

.daily{
    margin-top:20px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:25px;
    overflow:hidden;
    backdrop-filter:blur(12px);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.row:last-child{
    border:none;
}

.day{
    font-weight:700;
}

.daily-rain{
    color:var(--accent);
    font-weight:800;
}

/* Responsive */

@media(max-width:600px){

    .rain-amount{
        font-size:4.8rem;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="cityInput"
            placeholder="Search village, city, district..."
            autocomplete="off"
        >

        <button onclick="searchLocation()">
            SEARCH
        </button>

    </div>

    <!-- Hero -->

    <div class="hero">

        <!-- Rain Animation -->

        <div class="rain">

            <div class="drop"></div>
            <div class="drop"></div>
            <div class="drop"></div>
            <div class="drop"></div>
            <div class="drop"></div>
            <div class="drop"></div>

        </div>

        <div class="location" id="location">
            Detecting Location...
        </div>

        <div class="rain-amount" id="rainAmount">
            0
        </div>

        <div class="mm">
            mm Rainfall Today
        </div>

        <div class="status" id="status">
            Fetching live rainfall data...
        </div>

    </div>

    <!-- Hourly -->

    <div class="section-title">
        Hourly Rainfall
    </div>

    <div class="hourly" id="hourly"></div>

    <!-- Daily -->

    <div class="section-title">
        Next 5 Days Rainfall
    </div>

    <div class="daily" id="daily"></div>

</div>

<script>

/* API */

const API_KEY = "371f195d68084031ade140420261405";

/* Auto Detect Location */

window.onload = () => {

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

            pos => {

                fetchRainData(
                    `${pos.coords.latitude},${pos.coords.longitude}`
                );

            },

            () => {

                fetchRainData("Bagalkote");

            }

        );

    }
    else{

        fetchRainData("Bagalkote");

    }

};

/* Search Function */

function searchLocation(){

    const input = document
    .getElementById("cityInput")
    .value
    .trim();

    if(input === ""){

        document.getElementById("status").innerText =
        "Please enter a location.";

        return;

    }

    fetchRainData(input);

}

/* Enter Key Search */

document
.getElementById("cityInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        searchLocation();

    }

});

/* Fetch API */

async function fetchRainData(query){

    try{

        document.getElementById("status").innerText =
        "Loading rainfall data...";

        const response = await fetch(
        `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${query}&days=5&aqi=no`
        );

        const data = await response.json();

        if(data.error){

            document.getElementById("status").innerText =
            "Location not found.";

            return;
        }

        updateUI(data);

    }

    catch(error){

        document.getElementById("status").innerText =
        "Unable to fetch rainfall data.";

    }

}

/* Update UI */

function updateUI(data){

    /* Location */

    document.getElementById("location").innerText =
    `${data.location.name}, ${data.location.region}`;

    /* Hour Data */

    const hours = data.forecast.forecastday[0].hour;

    let totalRain = 0;

    hours.forEach(hr => {

        totalRain += hr.precip_mm;

    });

    /* Main Rain */

    document.getElementById("rainAmount").innerText =
    totalRain.toFixed(1);

    /* Dynamic Status */

    if(totalRain > 20){

        document.getElementById("status").innerText =
        "🌧 Heavy rainfall expected today.";

        document.documentElement
        .style
        .setProperty('--accent','#ff4d6d');

    }

    else if(totalRain > 5){

        document.getElementById("status").innerText =
        "☔ Moderate rainfall expected.";

        document.documentElement
        .style
        .setProperty('--accent','#00F5FF');

    }

    else{

        document.getElementById("status").innerText =
        "🌤 Light rainfall today.";

        document.documentElement
        .style
        .setProperty('--accent','#38bdf8');

    }

    /* Hourly Forecast */

    const hourly = document.getElementById("hourly");

    hourly.innerHTML = "";

    const now = new Date();

    hours.forEach(hr => {

        const time = new Date(hr.time);

        if(time > now){

            const card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `

                <div class="time">
                    ${time.getHours()}:00
                </div>

                <div class="amount">
                    ${hr.precip_mm}
                </div>

                <div class="unit">
                    mm
                </div>

            `;

            hourly.appendChild(card);

        }

    });

    /* Daily Forecast */

    const daily = document.getElementById("daily");

    daily.innerHTML = "";

    data.forecast.forecastday.forEach(day => {

        const row = document.createElement("div");

        row.className = "row";

        const weekday = new Date(day.date)
        .toLocaleDateString('en-US',{
            weekday:'long'
        });

        row.innerHTML = `

            <div class="day">
                ${weekday}
            </div>

            <div class="daily-rain">
                ${day.day.totalprecip_mm} mm
            </div>

        `;

        daily.appendChild(row);

    });

}

</script>

</body>
</html>
